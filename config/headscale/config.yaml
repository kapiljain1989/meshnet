###############################################################################
# MeshNet — Headscale Configuration
# Docs: https://headscale.net/ref/configuration/
###############################################################################

# ─── Server ──────────────────────────────────────────────────────────────────
# Public URL that Tailscale clients use to reach this control plane.
# Must match the domain Caddy terminates TLS for.
server_url: https://HEADSCALE_DOMAIN_PLACEHOLDER

listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090

# gRPC is used by the headscale CLI and headscale-ui API.
# Kept internal to Docker network — Caddy proxies external access.
grpc_listen_addr: 0.0.0.0:50443
grpc_allow_insecure: true   # Safe: gRPC only reachable inside Docker network

# ─── Noise Protocol ─────────────────────────────────────────────────────────
# Used for Tailscale 2021+ client protocol (Noise-based, not legacy DERP key)
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# ─── IP Prefixes ─────────────────────────────────────────────────────────────
# Address ranges assigned to mesh nodes.
# 100.64.0.0/10 matches Tailscale's CGNAT range.
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

# ─── Database ────────────────────────────────────────────────────────────────
database:
  type: sqlite3
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true    # WAL mode for better concurrent performance

# ─── DERP (Relay) ────────────────────────────────────────────────────────────
# Embedded DERP relay on this server. Used when P2P WireGuard fails (NAT, CGNAT).
# Clients try P2P first, fall back to DERP relay automatically.
derp:
  server:
    enabled: true
    region_id: 999
    region_code: "meshnet"
    region_name: "MeshNet Private Relay"
    stun_listen_addr: 0.0.0.0:3478
    private_key_path: /var/lib/headscale/derp_server_private.key
    # Set to your VPS public IP at deploy time (see deploy.sh)
    ipv4: SERVER_PUBLIC_IP_PLACEHOLDER
    ipv6: ""
    automatically_add_embedded_derp_region: true

  # Disable Tailscale's public DERP servers — fully self-hosted.
  urls: []
  paths: []
  auto_update_enabled: false
  update_frequency: 24h

# ─── DNS / MagicDNS ─────────────────────────────────────────────────────────
dns:
  magic_dns: true
  base_domain: mesh

  override_local_dns: true

  nameservers:
    global:
      - 1.1.1.1       # Cloudflare (primary)
      - 9.9.9.9       # Quad9 (secondary, security-focused)
      - 8.8.8.8       # Google (tertiary fallback)

  restricted_nameservers: {}

  # Custom DNS records within the mesh (optional)
  extra_records: []
  #  - name: "grafana.mesh"
  #    type: "A"
  #    value: "100.64.0.10"

# ─── Node & Key Settings ────────────────────────────────────────────────────
# Ephemeral nodes (e.g., CI runners) are cleaned up after this timeout.
ephemeral_node_inactivity_timeout: 30m

# Disable Headscale's own update checks (we manage versions via Docker image tags).
disable_check_updates: true

# ─── TLS ─────────────────────────────────────────────────────────────────────
# TLS is handled by Caddy reverse proxy — Headscale listens on plain HTTP internally.
tls_letsencrypt_hostname: ""
tls_cert_path: ""
tls_key_path: ""

# ─── Logging ─────────────────────────────────────────────────────────────────
log:
  format: text
  level: info

# ─── ACL Policy ──────────────────────────────────────────────────────────────
# Access control list. Starts permissive (all-to-all), tighten as you grow.
policy:
  path: /etc/headscale/acl.yaml

# ─── OIDC (disabled for v1 — enable when you add SSO) ───────────────────────
